notes: Hilltop Holdings is a financial holding company; revenue and fees flow through the operating
  subsidiaries (PlainsCapital Bank, HilltopSecurities, PrimeLending). There is no holding-company-level
  invoice surface. Meters and unit economics depend on which subsidiary the consumer integrates with.
description: 'FOCUS-aligned FinOps stub for Hilltop Holdings. No public billing surface exists at the
  holding-company level; FinOps tracking happens at the operating-subsidiary level.'
