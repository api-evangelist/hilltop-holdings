principles:
  - name: Visibility
    description: Use the executed subsidiary partner agreement's reporting cadence to track consumption
      and fees; no holding-company-level usage API exists.
  - name: Allocation
    description: Allocate fees by subsidiary line of business (banking, brokerage, mortgage) and by
      consuming product within your own organization.
  - name: Optimization
    description: Renegotiation and product fit at the subsidiary level are the primary cost levers.
  - name: Accountability
    description: Assign one relationship owner per subsidiary partnership; aggregate at the holding-company
      level for executive review.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Budgeting
  - name: Optimize Usage and Cost
    capabilities:
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Intersecting Disciplines
meters:
