notes: Hilltop Holdings is a financial holding company (PlainsCapital Bank, HilltopSecurities, PrimeLending).
  It does not operate a public developer portal at the holding-company level. Any API integrations would be
  with the operating subsidiaries under bilateral commercial / partner agreements. No public per-tier API
  pricing or rate-limit data exists at the Hilltop Holdings level. This artifact is intentionally minimal
  and unreconciled.
sources:
  - https://www.hilltop.com/
description: Hilltop Holdings does not publish public API pricing. Subsidiary-level integrations are
  governed by bilateral commercial agreements.
plans:
  - id: hilltop-holdings-partner
    name: Subsidiary Partner Agreement
    type: enterprise
    description: API and data integrations with Hilltop Holdings subsidiaries (PlainsCapital Bank,
      HilltopSecurities, PrimeLending) are negotiated bilaterally through standard banking / brokerage
      / mortgage partner programs. Pricing, quotas, SLAs, and rate limits are not publicly disclosed.
    entries:
      - label: Subsidiary Partner Access
        description: Pricing and quotas negotiated bilaterally; not publicly disclosed
        name: subsidiary_partner_access
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://www.hilltop.com
        unit: 1
        price: 'contact provider'
        userMultiplied: false
    elements:
      - name: Subsidiary Bilateral Agreement Required
      - name: Hilltop Holdings API
